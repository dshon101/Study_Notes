<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Study Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0f14;
  --surface: #13161e;
  --surface2: #1a1d28;
  --border: #252836;
  --border2: #2e3245;
  --text: #e8eaf2;
  --text2: #9097b8;
  --text3: #5a6080;
  --tag-bg: #1e2235;
  --correct: #2dd4b6;
  --incorrect: #f76f6f;
  /* Course accent colors */
  --crypto-accent: #4f8ef7;
  --crypto-accent2: #7c5af0;
  --forensics-accent: #f76f6f;
  --forensics-accent2: #f5a623;
  --networks-accent: #2dd4b6;
  --networks-accent2: #22b5a0;
  --cloud-accent: #a78bfa;
  --cloud-accent2: #7c5af0;
  --oop-accent: #f59e0b;
  --oop-accent2: #d97706;
  /* Active course colors (updated by JS) */
  --accent: #4f8ef7;
  --accent2: #7c5af0;
  --accent3: #2dd4b6;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Lora', Georgia, serif;
  font-size: 16px;
  line-height: 1.7;
  min-height: 100vh;
}

.layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: 100vh;
}

/* SIDEBAR */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-header {
  padding: 22px 20px 16px;
  border-bottom: 1px solid var(--border);
}

.sidebar-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 2px;
  transition: color 0.3s;
}

.sidebar-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--text);
  line-height: 1.2;
}

.sidebar-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  margin-top: 5px;
}

/* COURSE TABS */
.course-tabs {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.course-tab {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.18s;
  border: 1px solid transparent;
}
.course-tab:hover { background: var(--surface2); }
.course-tab.active { background: var(--surface2); border-color: var(--border2); }

.course-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.course-tab[data-course="crypto"] .course-dot { background: var(--crypto-accent); }
.course-tab[data-course="forensics"] .course-dot { background: var(--forensics-accent); }
.course-tab[data-course="networks"] .course-dot { background: var(--networks-accent); }
.course-tab[data-course="cloud"] .course-dot { background: var(--cloud-accent); }
.course-tab[data-course="oop"] .course-dot { background: var(--oop-accent); }

.course-tab-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  line-height: 1.2;
}
.course-tab.active .course-tab-name { color: var(--text); }

.course-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 10px;
  margin-left: auto;
}
.course-tab[data-course="crypto"] .course-badge { background: rgba(79,142,247,0.15); color: var(--crypto-accent); }
.course-tab[data-course="forensics"] .course-badge { background: rgba(247,111,111,0.15); color: var(--forensics-accent); }
.course-tab[data-course="networks"] .course-badge { background: rgba(45,212,182,0.15); color: var(--networks-accent); }
.course-tab[data-course="cloud"] .course-badge { background: rgba(167,139,250,0.15); color: var(--cloud-accent); }
.course-tab[data-course="oop"] .course-badge { background: rgba(245,158,11,0.15); color: var(--oop-accent); }

/* VIEW SWITCHER */
.view-switcher {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 5px;
}

.vsw-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 6px 4px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.18s;
}
.vsw-btn:hover { border-color: var(--accent); color: var(--accent); }
.vsw-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.nav-list {
  list-style: none;
  padding: 8px 0;
  flex: 1;
}

.nav-section-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--text3);
  padding: 10px 14px 4px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  cursor: pointer;
  transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { background: var(--surface2); }
.nav-item.active { background: var(--surface2); border-left-color: var(--accent); }
.nav-item.active .nav-num { color: var(--accent); }
.nav-item.active .nav-name { color: var(--text); }

.nav-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  min-width: 18px;
}

.nav-name {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1.3;
}

/* MAIN */
.main {
  overflow-y: auto;
  background: var(--bg);
}

/* HERO */
.hero {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 40px 52px 36px;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(var(--accent-rgb, 79,142,247),0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.hero-eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 10px;
  transition: color 0.3s;
}

.hero-heading {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 34px;
  line-height: 1.1;
  color: var(--text);
  margin-bottom: 12px;
}
.hero-heading span { color: var(--accent); transition: color 0.3s; }

.hero-desc {
  color: var(--text2);
  font-size: 14px;
  max-width: 560px;
  line-height: 1.65;
  margin-bottom: 20px;
}

.hero-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.hero-tag {
  background: var(--tag-bg);
  border: 1px solid var(--border2);
  color: var(--text2);
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
}

/* COMING SOON */
.coming-soon {
  padding: 60px 52px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.coming-soon-icon {
  font-size: 48px;
  margin-bottom: 20px;
}
.coming-soon-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: var(--text);
  margin-bottom: 10px;
}
.coming-soon-desc {
  font-size: 14px;
  color: var(--text3);
  max-width: 400px;
  line-height: 1.6;
}

/* CONTENT AREA */
.content-area { padding: 36px 52px 80px; }

/* NOTES VIEW */
.note-block {
  margin-bottom: 16px;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.note-block-header {
  background: var(--surface);
  padding: 11px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.04em;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
  transition: background 0.15s, color 0.3s;
}
.note-block-header:hover { background: var(--surface2); }

.nbh-arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.note-block.open .nbh-arrow { transform: rotate(180deg); }

.note-block-body {
  display: none;
  padding: 14px 16px;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  background: var(--bg);
  border-top: 1px solid var(--border);
}
.note-block.open .note-block-body { display: block; }
.note-block-body ul { padding-left: 20px; }
.note-block-body li { margin-bottom: 5px; }

.summary-strip {
  border-radius: 10px;
  padding: 14px 18px;
  margin-top: 20px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  border: 1px solid rgba(79,142,247,0.25);
  background: linear-gradient(135deg, rgba(79,142,247,0.07), rgba(124,90,240,0.07));
}
.summary-strip strong { color: var(--accent3); }

/* Q&A VIEW */
.qa-card {
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 12px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.qa-card:hover { border-color: var(--border2); }
.qa-card.revealed { border-color: rgba(79,142,247,0.3); }

.qa-question {
  padding: 14px 18px;
  background: var(--surface);
  cursor: pointer;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  user-select: none;
}
.qa-question:hover { background: var(--surface2); }

.qa-qnum {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  min-width: 24px;
  padding-top: 2px;
  transition: color 0.3s;
}

.qa-qtext {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.45;
  flex: 1;
}

.qa-reveal-hint {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text3);
  padding-top: 3px;
  white-space: nowrap;
}

.qa-answer {
  display: none;
  padding: 14px 18px 16px 54px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
}
.qa-card.revealed .qa-answer { display: block; }
.qa-card.revealed .qa-reveal-hint { color: var(--accent); }

/* SUMMARY VIEW */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}

.sum-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}

.sum-card-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--accent);
  margin-bottom: 7px;
  transition: color 0.3s;
}

.sum-card-content {
  font-size: 12px;
  color: var(--text2);
  line-height: 1.6;
  font-family: 'DM Mono', monospace;
}

/* WELCOME */
.welcome { padding: 36px 52px 80px; }
.welcome-section-title {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 12px;
  margin-top: 28px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.wst-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.welcome-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  margin-bottom: 8px;
}

.welcome-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.18s;
}
.welcome-card:hover {
  transform: translateY(-2px);
}
.welcome-card[data-course="crypto"]:hover { border-color: var(--crypto-accent); }
.welcome-card[data-course="forensics"]:hover { border-color: var(--forensics-accent); }
.welcome-card[data-course="networks"]:hover { border-color: var(--networks-accent); }
.welcome-card[data-course="cloud"]:hover { border-color: var(--cloud-accent); }
.welcome-card[data-course="oop"]:hover { border-color: var(--oop-accent); }

.wc-num {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  margin-bottom: 5px;
}
.welcome-card[data-course="crypto"] .wc-num { color: var(--crypto-accent); }
.welcome-card[data-course="forensics"] .wc-num { color: var(--forensics-accent); }
.welcome-card[data-course="networks"] .wc-num { color: var(--networks-accent); }
.welcome-card[data-course="cloud"] .wc-num { color: var(--cloud-accent); }
.welcome-card[data-course="oop"] .wc-num { color: var(--oop-accent); }

.wc-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--text);
  line-height: 1.3;
}
.wc-locked { color: var(--text3) !important; }

/* scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: relative; height: auto; }
  .hero, .content-area, .welcome { padding: 24px 20px; }
  .summary-grid { grid-template-columns: 1fr; }
  .hero-heading { font-size: 26px; }
}
</style>
</head>
<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo" id="sidebarLogo">CS Study Hub</div>
    <div class="sidebar-title" id="sidebarTitle">All Courses</div>
    <div class="sidebar-sub" id="sidebarSub">5 courses · click to explore</div>
  </div>

  <!-- COURSE TABS -->
  <div class="course-tabs">
    <div class="course-tab active" data-course="home" onclick="switchCourse('home', this)">
      <div class="course-dot" style="background:#555"></div>
      <span class="course-tab-name">All Courses</span>
    </div>
    <div class="course-tab" data-course="crypto" onclick="switchCourse('crypto', this)">
      <div class="course-dot"></div>
      <span class="course-tab-name">Cryptography</span>
      <span class="course-badge">13 topics</span>
    </div>
    <div class="course-tab" data-course="forensics" onclick="switchCourse('forensics', this)">
      <div class="course-dot"></div>
      <span class="course-tab-name">Cyber Forensics</span>
      <span class="course-badge">5 topics</span>
    </div>
    <div class="course-tab" data-course="networks" onclick="switchCourse('networks', this)">
      <div class="course-dot"></div>
      <span class="course-tab-name">Computer Networks 1</span>
      <span class="course-badge">5 topics</span>
    </div>
    <div class="course-tab" data-course="cloud" onclick="switchCourse('cloud', this)">
      <div class="course-dot"></div>
      <span class="course-tab-name">Cloud Computing</span>
      <span class="course-badge">5 topics</span>
    </div>
    <div class="course-tab" data-course="oop" onclick="switchCourse('oop', this)">
      <div class="course-dot"></div>
      <span class="course-tab-name">OOP with Java</span>
      <span class="course-badge">soon</span>
    </div>
  </div>

  <div class="view-switcher" id="viewSwitcher" style="display:none">
    <button class="vsw-btn active" onclick="setView('notes', this)">Notes</button>
    <button class="vsw-btn" onclick="setView('qa', this)">Q&amp;A</button>
    <button class="vsw-btn" onclick="setView('summary', this)">Summary</button>
  </div>

  <ul class="nav-list" id="navList"></ul>
</aside>

<!-- MAIN CONTENT -->
<main class="main" id="mainContent"></main>

</div>

<script>
// ──────────────────────────────────────────────
// DATA
// ──────────────────────────────────────────────

const COURSES = {

  crypto: {
    name: "Cryptography",
    accent: "#4f8ef7",
    accent2: "#7c5af0",
    accent3: "#2dd4b6",
    topics: [
      {
        short: "Intro to Cryptography",
        subtitle: "1.1 History · 1.2 Goals · 1.3 Basic Terminology · 1.4 Applications",
        notes: [
          { title: "History", body: "Cryptography dates back to ~1900 BC (ancient Egypt). Julius Caesar used simple letter substitution. The Vigenère cipher (1553) dominated for centuries. WWII Enigma machine prompted Alan Turing's codebreaking at Bletchley Park. Modern era began in 1976 with Diffie &amp; Hellman's landmark public-key paper, followed by RSA (1977)." },
          { title: "Goals (CIA + Non-repudiation)", body: "<ul><li><strong>Confidentiality</strong> — only authorised parties can read data</li><li><strong>Integrity</strong> — data has not been altered in transit</li><li><strong>Authentication</strong> — verifying the identity of parties</li><li><strong>Non-repudiation</strong> — sender cannot deny sending a message</li></ul>" },
          { title: "Basic Terminology", body: "<ul><li><strong>Plaintext (P)</strong> — original readable message</li><li><strong>Ciphertext (C)</strong> — encrypted output</li><li><strong>Encryption</strong> — C = E(K, P)</li><li><strong>Decryption</strong> — P = D(K, C)</li><li><strong>Key (K)</strong> — secret parameter controlling the cipher</li></ul>" },
          { title: "Kerckhoffs's Principle", body: "A cryptographic system should be secure even if everything about the system, except the key, is public knowledge. Security must NOT rely on keeping the algorithm secret." }
        ],
        summary: "Cryptography secures information through mathematical transformations. Four core goals: Confidentiality, Integrity, Authentication, Non-repudiation. The key is secret; the algorithm is public (Kerckhoffs).",
        sumCards: [
          { label: "Core Goals", content: "Confidentiality · Integrity · Authentication · Non-repudiation" },
          { label: "Key Equation", content: "Encrypt: C = E(K,P)\nDecrypt: P = D(K,C)" },
          { label: "Timeline", content: "1900 BC → Caesar → Enigma → 1976 DH → RSA → AES" },
          { label: "Applications", content: "HTTPS · PGP · VPN · Signatures · Blockchain · Passwords" }
        ],
        qa: [
          { q: "What are the four main goals of cryptography? Give a real-world example of each.", a: "Confidentiality (encrypted WhatsApp messages), Integrity (file checksums), Authentication (login passwords), Non-repudiation (digitally signed contracts)." },
          { q: "Explain Kerckhoffs's Principle and why it matters.", a: "The system must remain secure even when the algorithm is fully public. Only the key is secret. This ensures security doesn't depend on obscurity — algorithms can be publicly scrutinised for weaknesses." },
          { q: "What is the difference between encryption and hashing?", a: "Encryption is reversible with the correct key: C = E(K,P) and P = D(K,C). Hashing is one-way: H(P) → fixed digest. Hashes are used for integrity checks and password storage; encryption for confidentiality of data that must be recovered." },
          { q: "Name three real-world applications of cryptography.", a: "1) HTTPS/TLS — encrypts web traffic. 2) PGP — end-to-end email encryption. 3) bcrypt/Argon2 — secure password storage using salted hashing." },
          { q: "Describe one historical example where breaking a cipher changed history.", a: "Breaking the German Enigma at Bletchley Park (WWII) allowed the Allies to decode German military communications, significantly shortening the war. Alan Turing led the effort, creating the Bombe machine." }
        ]
      },
      {
        short: "Symmetric Encryption",
        subtitle: "2.1 Block Ciphers · 2.2 DES · 2.3 AES · 2.4 Modes of Operation",
        notes: [
          { title: "Block Ciphers", body: "Operate on fixed-size blocks of plaintext (e.g., 64-bit DES, 128-bit AES). Use multiple rounds of substitution and permutation. Key properties: <strong>Confusion</strong> (obscure relationship between key and ciphertext via S-boxes) and <strong>Diffusion</strong> (spread plaintext influence across ciphertext via permutations)." },
          { title: "DES (Data Encryption Standard)", body: "56-bit key, 64-bit blocks, 16 rounds Feistel structure. Standardised 1977. Now considered <strong>insecure</strong> — key too short (brute-forced in 22 hours in 1999). 3DES (Triple-DES) applies DES three times for extended life but is slow." },
          { title: "AES (Advanced Encryption Standard)", body: "128-bit block, keys of 128/192/256 bits. Substitution-Permutation Network. Rounds: 10/12/14 depending on key size. Operations: SubBytes (S-box), ShiftRows, MixColumns, AddRoundKey. Currently the global standard — used in TLS, Wi-Fi (WPA2), disk encryption." },
          { title: "Modes of Operation", body: "<ul><li><strong>ECB</strong> — same block → same ciphertext (insecure, reveals patterns)</li><li><strong>CBC</strong> — XOR with previous ciphertext before encrypting; needs random IV</li><li><strong>CTR</strong> — turns block cipher into stream cipher using counter; parallelisable</li><li><strong>GCM</strong> — CTR + GHASH authentication; provides both encryption and integrity</li></ul>" }
        ],
        summary: "Symmetric encryption uses one shared key. AES is the modern standard — 128-bit blocks, up to 256-bit keys. Modes of operation (CBC, CTR, GCM) determine how blocks are chained. Never use ECB for real data.",
        sumCards: [
          { label: "DES vs AES", content: "DES: 56-bit key, broken\nAES: 128/192/256-bit, secure" },
          { label: "AES Operations", content: "SubBytes · ShiftRows · MixColumns · AddRoundKey" },
          { label: "Block Modes", content: "ECB: insecure · CBC: IV needed · CTR: parallel · GCM: auth" },
          { label: "Confusion/Diffusion", content: "Confusion: S-boxes hide key\nDiffusion: permutations spread plaintext" }
        ],
        qa: [
          { q: "Why is ECB mode considered insecure?", a: "In ECB, identical plaintext blocks encrypt to identical ciphertext blocks. This leaks patterns in the data — the classic example is an ECB-encrypted image where the outline of the original image is still visible in the ciphertext." },

          { q: "What is timestomping and how can it be detected?", a: "Timestomping is the manipulation of file timestamps to hide when a file was created or modified. In NTFS, attackers can change $STANDARD_INFORMATION timestamps with tools like Metasploit's timestomp module. Detection: compare $STANDARD_INFORMATION timestamps with $FILE_NAME timestamps — the kernel updates $FILE_NAME during file operations, making it harder to forge without special privileges." },

          { q: "A Wireshark capture shows hundreds of TCP SYN packets to different ports from one IP, with no corresponding SYN-ACK or RST from the target. What is happening?", a: "This is a SYN scan (Nmap -sS). The attacker sends SYN packets to probe which ports are open. Open ports respond with SYN-ACK; closed ports with RST. By sending only SYN (never completing the three-way handshake), the attacker avoids leaving connection logs on some systems. The lack of SYN-ACK responses to most ports means those ports are filtered or closed." },

          { q: "List the six phases of the NIST incident response lifecycle.", a: "1) Preparation — establish IR capability. 2) Detection & Analysis — identify and scope the incident. 3) Containment — isolate affected systems. 4) Eradication — remove threat (malware, backdoors). 5) Recovery — restore and monitor. 6) Post-Incident Activity — lessons learned and defences improved." },

          { q: "What is the difference between a stateless and stateful firewall?", a: "A stateless (packet filter) firewall inspects each packet independently based on header fields (IP, port, protocol) — it has no memory of previous packets. A stateful firewall tracks TCP connection state — it allows return traffic only for established sessions. Stateless can be spoofed with crafted packets that appear to be return traffic; stateful cannot." },
          { q: "Explain how IPSec Tunnel mode works and where it is typically deployed.", a: "In Tunnel mode, IPSec encrypts the entire original IP packet (header + data) and adds a new outer IP header for routing. This hides both the payload and the original source/destination IPs. It is used for site-to-site VPNs between corporate offices — the tunnel endpoints are the gateways, not the end hosts." },
          { q: "What is a DDoS attack and what distinguishes it from DoS?", a: "A DoS (Denial of Service) attack comes from a single source, flooding a target to exhaust bandwidth, connections, or compute resources. A DDoS (Distributed DoS) uses thousands of compromised machines (a botnet) to amplify the attack volume, making it much harder to block — filtering one IP is useless when the attack comes from 100,000 IPs simultaneously." },
          { q: "What does Dynamic ARP Inspection (DAI) do and what attack does it prevent?", a: "DAI inspects all ARP packets on a switch. It checks them against a DHCP snooping binding table (trusted IP-to-MAC-to-port mappings). ARP replies that don't match the table are dropped. This prevents ARP poisoning/spoofing attacks, where an attacker sends fake ARP replies to associate their MAC with the default gateway's IP." },
          { q: "Why should Telnet be replaced with SSH for network device management?", a: "Telnet transmits all data — including usernames, passwords, and configuration commands — in clear text. Anyone on the same network segment can capture Telnet sessions with Wireshark and read credentials. SSH encrypts the entire session using TLS-like mechanisms. Additionally, SSH supports key-based authentication, which is stronger than password-based login." }
        ]
      }
    ]

let currentCourse = 'home';
let currentTopic = null;
let currentView = 'notes';

// ──────────────────────────────────────────────
// COURSE SWITCHING
// ──────────────────────────────────────────────
function switchCourse(course, tabEl) {
  currentCourse = course;
  currentTopic = null;
  currentView = 'notes';

  // Update tab highlights
  document.querySelectorAll('.course-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');

  if (course === 'home') {
    document.getElementById('sidebarLogo').textContent = 'CS Study Hub';
    document.getElementById('sidebarTitle').textContent = 'All Courses';
    document.getElementById('sidebarSub').textContent = '5 courses · click to explore';
    document.getElementById('viewSwitcher').style.display = 'none';
    document.getElementById('navList').innerHTML = '';
    document.documentElement.style.setProperty('--accent', '#6b7280');
    document.documentElement.style.setProperty('--accent2', '#4b5563');
    document.documentElement.style.setProperty('--accent3', '#9ca3af');
    showHome();
    return;
  }

  const c = COURSES[course];
  document.getElementById('sidebarLogo').textContent = 'CS Study Hub';
  document.getElementById('sidebarTitle').textContent = c.name;
  document.getElementById('sidebarSub').textContent = c.topics.length + ' topics · click to explore';

  // Update CSS accent colors
  document.documentElement.style.setProperty('--accent', c.accent);
  document.documentElement.style.setProperty('--accent2', c.accent2);
  document.documentElement.style.setProperty('--accent3', c.accent3);

  if (c.comingSoon) {
    document.getElementById('viewSwitcher').style.display = 'none';
    document.getElementById('navList').innerHTML = '';
    showComingSoon(c);
    return;
  }

  document.getElementById('viewSwitcher').style.display = 'flex';
  // Reset view buttons
  document.querySelectorAll('.vsw-btn').forEach((b, i) => b.classList.toggle('active', i === 0));

  buildNav();
  showCourseWelcome();
}

function buildNav() {
  const c = COURSES[currentCourse];
  const nav = document.getElementById('navList');
  nav.innerHTML = '';
  c.topics.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = `<span class="nav-num">${String(i+1).padStart(2,'0')}</span><span class="nav-name">${t.short}</span>`;
    li.onclick = () => loadTopic(i);
    nav.appendChild(li);
  });
}

function setActiveNav(idx) {
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function setView(v, btn) {
  currentView = v;
  document.querySelectorAll('.vsw-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (currentTopic !== null) loadTopic(currentTopic);
  else showCourseWelcome();
}

        <span class="hero-tag">5 Courses</span>
        <span class="hero-tag">28 Topics</span>
        <span class="hero-tag">Short Notes</span>
        <span class="hero-tag">Q&A Flashcards</span>
        <span class="hero-tag">Summary Cards</span>
      </div>
    </div>
    <div class="welcome">
  `;

  courseKeys.forEach(key => {
    const c = COURSES[key];
    const colorMap = { crypto:'var(--crypto-accent)', forensics:'var(--forensics-accent)', networks:'var(--networks-accent)', cloud:'var(--cloud-accent)', oop:'var(--oop-accent)' };
    const col = colorMap[key];
    html += `
      <div class="welcome-section-title">
        <div class="wst-dot" style="background:${col}"></div>
        ${c.name}${c.comingSoon ? ' <span style="font-family:DM Mono,monospace;font-size:9px;color:var(--text3)">(coming soon)</span>' : ''}
      </div>
      <div class="welcome-grid">
    `;
    if (c.comingSoon) {
      html += `<div class="welcome-card" data-course="${key}" onclick="switchCourse('${key}', document.querySelector('[data-course=${key}]'))">
        <div class="wc-num wc-locked">COMING SOON</div>
        <div class="wc-title wc-locked">${c.name} — Topics being prepared</div>
      </div>`;
    } else {
      c.topics.forEach((t, i) => {
        html += `<div class="welcome-card" data-course="${key}" onclick="switchCourse('${key}', document.querySelector('[data-course=\\'${key}\\']')); setTimeout(()=>loadTopic(${i}),50)">
          <div class="wc-num">${String(i+1).padStart(2,'0')}</div>
          <div class="wc-title">${t.short}</div>
        </div>`;
      });
    }
    html += `</div>`;
  });

  html += `</div>`;
  main.innerHTML = html;
}

function showComingSoon(c) {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="hero" style="border-bottom:1px solid var(--border)">
      <div class="hero-eyebrow">${c.name}</div>
      <h1 class="hero-heading"><span>${c.name}</span></h1>
      <p class="hero-desc">This course is currently being prepared. Check back soon!</p>
    </div>
    <div class="coming-soon">
      <div class="coming-soon-icon">🚧</div>
      <div class="coming-soon-title">Content Coming Soon</div>
      <div class="coming-soon-desc">We're compiling comprehensive notes, Q&A flashcards, and summary cards for <strong>${c.name}</strong>. This section will be ready shortly.</div>
    </div>
  `;
}

function showCourseWelcome() {
  const c = COURSES[currentCourse];
  const main = document.getElementById('mainContent');
  let html = `
    <div class="hero">
      <div class="hero-eyebrow">${c.name}</div>
      <h1 class="hero-heading"><span>${c.name}</span> Study Guide</h1>
      <p class="hero-desc">${c.topics.length} topics with notes, Q&A flashcards, and summary cards.</p>
      <div class="hero-tags">
        <span class="hero-tag">${c.topics.length} Topics</span>
        <span class="hero-tag">Short Notes</span>
        <span class="hero-tag">Q&amp;A Flashcards</span>
        <span class="hero-tag">Summary Cards</span>
      </div>
    </div>
    <div class="welcome"><div class="welcome-grid">
  `;
  c.topics.forEach((t, i) => {
    html += `<div class="welcome-card" data-course="${currentCourse}" onclick="loadTopic(${i})">
      <div class="wc-num">${String(i+1).padStart(2,'0')}</div>
      <div class="wc-title">${t.short}</div>
    </div>`;
  });
  html += `</div></div>`;
  main.innerHTML = html;
}

function loadTopic(idx) {
  currentTopic = idx;
  setActiveNav(idx);
  const c = COURSES[currentCourse];
  const t = c.topics[idx];
  const main = document.getElementById('mainContent');

  let html = `
    <div class="hero">
      <div class="hero-eyebrow">Topic ${String(idx+1).padStart(2,'0')} of ${c.topics.length} — ${c.name}</div>
      <h1 class="hero-heading"><span>${t.short.split(' ')[0]}</span> ${t.short.split(' ').slice(1).join(' ')}</h1>
      <p class="hero-desc">${t.subtitle}</p>
    </div>
    <div class="content-area">
  `;

  if (currentView === 'notes') {
    t.notes.forEach((n, ni) => {
      html += `
        <div class="note-block" id="nb-${idx}-${ni}">
          <div class="note-block-header" onclick="toggleNote('nb-${idx}-${ni}')">
            <span>${n.title}</span>
            <span class="nbh-arrow">▼</span>
          </div>
          <div class="note-block-body">${n.body}</div>
        </div>
      `;
    });
    html += `<div class="summary-strip"><strong>Summary:</strong> ${t.summary}</div>`;
  } else if (currentView === 'qa') {
    html += `<p style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3);margin-bottom:18px;">Click any question to reveal the answer.</p>`;
    t.qa.forEach((item, qi) => {
      html += `
        <div class="qa-card" id="qa-${idx}-${qi}">
          <div class="qa-question" onclick="toggleQA('qa-${idx}-${qi}')">
            <span class="qa-qnum">Q${qi+1}</span>
            <span class="qa-qtext">${item.q}</span>
            <span class="qa-reveal-hint">reveal ▾</span>
          </div>
          <div class="qa-answer">${item.a}</div>
        </div>
      `;
    });
  } else {
    html += `<div class="summary-grid">`;
    t.sumCards.forEach(card => {
      html += `<div class="sum-card">
        <div class="sum-card-label">${card.label}</div>
        <div class="sum-card-content">${card.content}</div>
      </div>`;
    });
    html += `</div>`;
    html += `<div class="summary-strip"><strong>Summary:</strong> ${t.summary}</div>`;
  }

  html += `</div>`;
  main.innerHTML = html;
  main.scrollTop = 0;
}

function toggleNote(id) {
  document.getElementById(id).classList.toggle('open');
}

function toggleQA(id) {
  document.getElementById(id).classList.toggle('revealed');
}

// Init
showHome();
</script>
</body>
</html>
